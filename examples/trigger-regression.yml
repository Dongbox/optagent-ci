name: Trigger External Regression

# Reference copy. The maintained workflow lives in the optagent repository at
# .github/workflows/trigger-regression.yml.

on:
  workflow_dispatch:
    inputs:
      optagent_sha:
        description: Full 40-character optagent commit SHA
        required: true
        type: string

permissions:
  contents: read
  statuses: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Mark pending
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ inputs.optagent_sha }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
            -f state=pending \
            -f context=optagent-ci/regression \
            -f description="Dispatching external regression matrix"
      - name: Dispatch exact SHA
        env:
          GH_TOKEN: ${{ secrets.OPTAGENT_CI_TOKEN }}
          SHA: ${{ inputs.optagent_sha }}
        run: |
          [[ "${SHA}" =~ ^[0-9a-fA-F]{40}$ ]]
          gh workflow run kernel-regression.yml \
            --repo Dongbox/optagent-ci \
            --ref main \
            -f optagent_sha="${SHA}"
