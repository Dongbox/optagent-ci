name: Numeric Stability Regression

# Verifies that fixed-seed solve results remain numerically consistent
# across compiler/optimization changes. Runs after the main regression matrix.

on:
  workflow_run:
    workflows: ["Kernel Regression Matrix"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "optagent commit SHA or branch"
        required: false
        default: "master"

permissions:
  contents: read

env:
  OPTAGENT_REF: ${{ github.event.inputs.ref || 'main' }}

jobs:
  numeric-stability:
    name: "Numeric regression (GCC 13, -O2)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++-13 ninja-build cmake python3-dev python3-venv python3-pip git

      - name: Clone optagent
        run: |
          git clone --depth 1 --branch "${{ env.OPTAGENT_REF }}" \
            "https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/Dongbox/optagent.git" \
            optagent

      - name: Setup and build
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install pybind11 pytest protobuf numpy ortools
          cmake -S optagent -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_CXX_FLAGS="-O2" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target _optagent_native -j$(nproc)

      - name: Run numeric regression
        env:
          PYTHONPATH: "build:optagent/src"
        run: |
          . .venv/bin/activate
          python -m pytest optagent/tests/test_kernel_*.py -q --tb=short -k "regression or determinism or roundtrip"

      - name: Run benchmark smoke (fixed seed)
        env:
          PYTHONPATH: "build:optagent/src"
        run: |
          . .venv/bin/activate
          python optagent/tests/wheel_smoke_solve.py
          python optagent/tests/wheel_smoke_delta.py
          python optagent/tests/wheel_smoke_strategy.py
