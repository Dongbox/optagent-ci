name: Kernel Regression Matrix

on:
  workflow_dispatch:
    inputs:
      optagent_sha:
        description: Full 40-character optagent commit SHA to test
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: kernel-regression-${{ inputs.optagent_sha }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  STATUS_CONTEXT: optagent-ci/regression

jobs:
  resolve:
    name: Resolve optagent revision
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.ref.outputs.sha }}
    steps:
      - name: Resolve and validate exact SHA
        id: ref
        env:
          GH_TOKEN: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          INPUT_SHA: ${{ inputs.optagent_sha }}
        run: |
          set -euo pipefail
          SHA="${INPUT_SHA}"
          if [[ ! "${SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "optagent_sha must be a full 40-character commit SHA" >&2
            exit 2
          fi
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"
          gh api "repos/Dongbox/optagent/commits/${SHA}" --silent

      - name: Mark regression pending
        env:
          GH_TOKEN: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          SHA: ${{ steps.ref.outputs.sha }}
        run: |
          gh api --method POST "repos/Dongbox/optagent/statuses/${SHA}" \
            -f state=pending \
            -f context="${STATUS_CONTEXT}" \
            -f description="OptAgent regression tests are running" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  harness-tests:
    name: Validate CI harness
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m unittest discover -s tests -v

  gcc-fast:
    name: GCC fast regression
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Checkout exact optagent revision
        uses: actions/checkout@v4
        with:
          repository: Dongbox/optagent
          ref: ${{ needs.resolve.outputs.sha }}
          token: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          persist-credentials: false
          path: optagent
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install native test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++-13 ninja-build cmake
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install 'pybind11>=2.13,<3.0' 'pytest>=8.3,<9.0' 'protobuf>=6.33,<7.0' 'numpy>=1.26,<3.0' 'cryptography>=43,<46'
      - name: Configure and build native tests
        run: |
          . .venv/bin/activate
          PYBIND11_DIR="$(python -m pybind11 --cmakedir)"
          cmake -S optagent -B build/gcc-fast -G Ninja \
            -Dpybind11_DIR="${PYBIND11_DIR}" \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPTAGENT_BUILD_CPP_TESTS=ON
          cmake --build build/gcc-fast -j"$(nproc)"
      - name: Run C++ owner tests
        run: ctest --test-dir build/gcc-fast --output-on-failure
      - name: Run Python regression and contracts
        env:
          PYTHONPATH: ${{ github.workspace }}/build/gcc-fast:${{ github.workspace }}/optagent:${{ github.workspace }}/optagent/src
        run: |
          . .venv/bin/activate
          python -m pytest -q \
            optagent/tests/python/regression \
            optagent/tests/python/integration/kernel_contract \
            optagent/tests/python/integration/solve/test_kernel_route.py \
            --tb=short
      - name: Generate semantic snapshot
        env:
          PYTHONPATH: ${{ github.workspace }}/build/gcc-fast:${{ github.workspace }}/optagent:${{ github.workspace }}/optagent/src
        run: |
          . .venv/bin/activate
          python optagent/scripts/tests/regression_snapshot.py --output artifacts/gcc/snapshot.json
      - uses: actions/upload-artifact@v4
        with:
          name: regression-snapshot-gcc-${{ needs.resolve.outputs.sha }}
          path: artifacts/gcc/snapshot.json
          retention-days: 14

  report-status:
    name: Report optagent commit status
    if: always() && needs.resolve.result == 'success'
    needs: [resolve, harness-tests, gcc-fast]
    runs-on: ubuntu-latest
    steps:
      - name: Determine aggregate result
        id: result
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = [
              name for name, value in needs.items()
              if name != "resolve" and value["result"] not in {"success", "skipped"}
          ]
          state = "failure" if failed else "success"
          description = (
              "Failed jobs: " + ", ".join(failed)
              if failed
              else "OptAgent regression tests passed"
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"state={state}\n")
              output.write(f"description={description[:140]}\n")
          PY
      - name: Write commit status
        env:
          GH_TOKEN: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          SHA: ${{ needs.resolve.outputs.sha }}
          STATE: ${{ steps.result.outputs.state }}
          DESCRIPTION: ${{ steps.result.outputs.description }}
        run: |
          gh api --method POST "repos/Dongbox/optagent/statuses/${SHA}" \
            -f state="${STATE}" \
            -f context="${STATUS_CONTEXT}" \
            -f description="${DESCRIPTION}" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
      - name: Fail workflow when regression failed
        if: steps.result.outputs.state != 'success'
        run: exit 1
