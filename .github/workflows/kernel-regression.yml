name: Kernel Regression Matrix

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "optagent commit SHA or branch to test"
        required: false
        default: "cpp-python-boundary-redesign"
      full_matrix:
        description: "Run full matrix including LTO and cross-platform"
        type: boolean
        default: false

  schedule:
    - cron: "0 6 * * 0"

  push:
    branches: [main]
    paths:
      - ".github/workflows/kernel-regression.yml"

permissions:
  contents: read

concurrency:
  group: kernel-regression
  cancel-in-progress: true

jobs:
  # ============================================================
  # Phase 1: Generate golden fixtures (GCC 13 on x86_64)
  # ============================================================
  generate-golden:
    name: "Generate x86_64 golden fixtures"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++-13 ninja-build cmake python3-dev python3-venv python3-pip git

      - name: Clone optagent (private)
        run: |
          REF="${{ github.event.inputs.ref }}"
          REF="${REF:-cpp-python-boundary-redesign}"
          git clone --depth 1 --branch "$REF" \
            "https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/Dongbox/optagent.git" \
            optagent

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install pybind11 pytest protobuf numpy

      - name: Build kernel (GCC 13 -O2)
        run: |
          . .venv/bin/activate
          PYBIND11_DIR=$(python3 -m pybind11 --cmakedir)
          cmake -S optagent -B build -G Ninja \
            -Dpybind11_DIR="$PYBIND11_DIR" \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            "-DCMAKE_CXX_FLAGS=-O2" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target _optagent_native -j$(nproc)

      - name: Generate golden fixtures for x86_64
        env:
          PYTHONPATH: "../build:src"
          GENERATE_GOLDEN: "1"
        run: |
          . .venv/bin/activate
          cd optagent
          python -m pytest tests/test_kernel_determinism.py -q --tb=short
          echo "Generated golden fixtures:"
          find tests/fixtures/determinism/ -name "*.json" | sort

      - name: Upload golden fixtures
        uses: actions/upload-artifact@v4
        with:
          name: golden-fixtures-x86_64
          path: optagent/tests/fixtures/determinism/x86_64/
          if-no-files-found: error

  # ============================================================
  # Phase 2: Cross-compiler regression (compare against golden)
  # ============================================================
  linux:
    name: "Linux ${{ matrix.name }}"
    needs: generate-golden
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "GCC 13 -O2"
            cc: gcc-13
            cxx: g++-13
            flags: "-O2"
            linker_flags: ""
            weekly_only: "false"
            packages: "g++-13"

          - name: "Clang 18 -O2"
            cc: clang-18
            cxx: clang++-18
            flags: "-O2"
            linker_flags: ""
            weekly_only: "false"
            packages: "clang-18 libc++-18-dev libc++abi-18-dev"

          - name: "GCC 13 ASan+UBSan"
            cc: gcc-13
            cxx: g++-13
            flags: "-O1"
            linker_flags: "-fsanitize=address,undefined"
            extra_target_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all"
            weekly_only: "false"
            packages: "g++-13"

          - name: "GCC 14 -O3 LTO"
            cc: gcc-14
            cxx: g++-14
            flags: "-O3 -flto=auto"
            linker_flags: "-flto=auto"
            weekly_only: "true"
            packages: "g++-14"

          - name: "Clang 18 -O3 ThinLTO"
            cc: clang-18
            cxx: clang++-18
            flags: "-O3 -flto=thin"
            linker_flags: "-flto=thin -fuse-ld=lld"
            weekly_only: "true"
            packages: "clang-18 lld-18 libc++-18-dev libc++abi-18-dev"

    steps:
      - name: Determine if this config should run
        id: gate
        shell: bash
        run: |
          WEEKLY_ONLY="${{ matrix.weekly_only }}"
          EVENT="${{ github.event_name }}"
          FULL="${{ github.event.inputs.full_matrix }}"
          if [[ "$WEEKLY_ONLY" == "true" && "$EVENT" != "schedule" && "$FULL" != "true" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install compiler toolchain
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build cmake python3-dev python3-venv python3-pip git \
            ${{ matrix.packages }}

      - name: Clone optagent (private)
        if: steps.gate.outputs.run == 'true'
        run: |
          REF="${{ github.event.inputs.ref }}"
          REF="${REF:-cpp-python-boundary-redesign}"
          git clone --depth 1 --branch "$REF" \
            "https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/Dongbox/optagent.git" \
            optagent

      - name: Download golden fixtures
        if: steps.gate.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          name: golden-fixtures-x86_64
          path: optagent/tests/fixtures/determinism/x86_64/

      - name: Set up Python venv
        if: steps.gate.outputs.run == 'true'
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install pybind11 pytest protobuf numpy

      - name: Configure CMake
        if: steps.gate.outputs.run == 'true'
        run: |
          . .venv/bin/activate
          PYBIND11_DIR=$(python3 -m pybind11 --cmakedir)
          cmake -S optagent -B build -G Ninja \
            -Dpybind11_DIR="$PYBIND11_DIR" \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            "-DCMAKE_CXX_FLAGS=${{ matrix.flags }}" \
            "-DCMAKE_EXE_LINKER_FLAGS=${{ matrix.linker_flags }}" \
            "-DCMAKE_SHARED_LINKER_FLAGS=${{ matrix.linker_flags }}" \
            "-DCMAKE_MODULE_LINKER_FLAGS=${{ matrix.linker_flags }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Apply sanitizer flags to target (ASan only)
        if: steps.gate.outputs.run == 'true' && matrix.extra_target_flags != ''
        run: |
          echo 'target_compile_options(_optagent_native PRIVATE ${{ matrix.extra_target_flags }})' >> optagent/CMakeLists.txt

      - name: Build kernel extension
        if: steps.gate.outputs.run == 'true'
        run: cmake --build build --target _optagent_native -j$(nproc)

      - name: Run kernel regression tests
        if: steps.gate.outputs.run == 'true'
        env:
          PYTHONPATH: "../build:src"
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1:strict_string_checks=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
        run: |
          . .venv/bin/activate
          cd optagent
          python -m pytest tests/test_kernel_determinism.py tests/test_kernel_smoke.py tests/test_kernel_validation.py tests/test_kernel_delta_regression.py -q --tb=short

      - name: Auto-diagnose divergence
        if: failure() && steps.gate.outputs.run == 'true'
        env:
          PYTHONPATH: "../build:src"
        run: |
          . .venv/bin/activate
          cd optagent
          python -m tests.diagnose_divergence --json || true

      - name: Upload diagnosis report
        if: failure() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: divergence-report-${{ matrix.name }}
          path: optagent/tests/fixtures/determinism/reports/
          if-no-files-found: ignore

  # ============================================================
  # macOS: Apple Clang (weekly / full_matrix only)
  # ============================================================
  macos:
    name: "macOS Apple Clang -O2"
    runs-on: macos-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.full_matrix == 'true')
    steps:
      - name: Clone optagent (private)
        run: |
          REF="${{ github.event.inputs.ref }}"
          REF="${REF:-cpp-python-boundary-redesign}"
          git clone --depth 1 --branch "$REF" \
            "https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/Dongbox/optagent.git" \
            optagent

      - name: Setup
        run: |
          brew install ninja cmake
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install pybind11 pytest protobuf numpy

      - name: Build
        run: |
          . .venv/bin/activate
          PYBIND11_DIR=$(python3 -m pybind11 --cmakedir)
          cmake -S optagent -B build -G Ninja \
            -Dpybind11_DIR="$PYBIND11_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-O2"
          cmake --build build --target _optagent_native -j$(sysctl -n hw.ncpu)

      - name: Test (self-consistency only, no golden comparison)
        env:
          PYTHONPATH: "build:optagent/src"
        run: |
          . .venv/bin/activate
          cd optagent
          python -m pytest tests/test_kernel_determinism.py -q --tb=short -k "self_consistency"
          python -m pytest tests/test_kernel_smoke.py tests/test_kernel_validation.py -q --tb=short

  # ============================================================
  # Windows: MSVC (weekly / full_matrix only)
  # ============================================================
  windows:
    name: "Windows MSVC /O2"
    runs-on: windows-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.full_matrix == 'true')
    steps:
      - name: Clone optagent (private)
        shell: bash
        run: |
          REF="${{ github.event.inputs.ref }}"
          REF="${REF:-cpp-python-boundary-redesign}"
          git clone --depth 1 --branch "$REF" \
            "https://x-access-token:${PAT}@github.com/Dongbox/optagent.git" \
            optagent
        env:
          PAT: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install pybind11 pytest protobuf numpy ninja

      - name: Build
        shell: pwsh
        run: |
          $pybind11Dir = python -m pybind11 --cmakedir
          cmake -S optagent -B build -G Ninja -Dpybind11_DIR="$pybind11Dir" -DCMAKE_BUILD_TYPE=Release "-DCMAKE_CXX_FLAGS=/O2"
          cmake --build build --target _optagent_native -j $env:NUMBER_OF_PROCESSORS

      - name: Test (self-consistency only)
        shell: pwsh
        run: |
          $env:PYTHONPATH = "..\build;optagent\src"
          cd optagent
          python -m pytest tests/test_kernel_determinism.py -q --tb=short -k "self_consistency"
          python -m pytest tests/test_kernel_smoke.py tests/test_kernel_validation.py -q --tb=short
