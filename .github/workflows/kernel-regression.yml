name: Kernel Cross-Platform Regression

on:
  workflow_dispatch:
    inputs:
      optagent_sha:
        description: Full 40-character optagent commit SHA to test
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: kernel-regression-${{ inputs.optagent_sha }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  STATUS_CONTEXT: optagent-ci/regression

jobs:
  resolve:
    name: Resolve optagent revision
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.ref.outputs.sha }}
    steps:
      - name: Resolve and validate exact SHA
        id: ref
        env:
          GH_TOKEN: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          INPUT_SHA: ${{ inputs.optagent_sha }}
        run: |
          set -euo pipefail
          SHA="${INPUT_SHA}"
          if [[ ! "${SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "optagent_sha must be a full 40-character commit SHA" >&2
            exit 2
          fi
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"
          gh api "repos/Dongbox/optagent/commits/${SHA}" --silent

      - name: Mark regression pending
        env:
          GH_TOKEN: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          SHA: ${{ steps.ref.outputs.sha }}
        run: |
          gh api --method POST "repos/Dongbox/optagent/statuses/${SHA}" \
            -f state=pending \
            -f context="${STATUS_CONTEXT}" \
            -f description="OptAgent regression tests are running" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  harness-tests:
    name: Validate CI harness
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: python -m unittest discover -s tests -v

  gcc-fast:
    name: GCC fast regression
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Checkout exact optagent revision
        uses: actions/checkout@v4
        with:
          repository: Dongbox/optagent
          ref: ${{ needs.resolve.outputs.sha }}
          token: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          persist-credentials: false
          path: optagent
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install native test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++-13 ninja-build cmake
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install 'pybind11>=2.13,<3.0' 'pytest>=8.3,<9.0' 'protobuf>=6.33,<7.0' 'numpy>=1.26,<3.0' 'cryptography>=43,<46'
      - name: Configure and build native tests
        run: |
          . .venv/bin/activate
          PYBIND11_DIR="$(python -m pybind11 --cmakedir)"
          cmake -S optagent -B build/gcc-fast -G Ninja \
            -Dpybind11_DIR="${PYBIND11_DIR}" \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPTAGENT_BUILD_CPP_TESTS=ON
          cmake --build build/gcc-fast -j"$(nproc)"
      - name: Run C++ owner tests
        run: ctest --test-dir build/gcc-fast --output-on-failure
      - name: Run Python regression and contracts
        env:
          PYTHONPATH: ${{ github.workspace }}/build/gcc-fast:${{ github.workspace }}/optagent:${{ github.workspace }}/optagent/src
        run: |
          . .venv/bin/activate
          python -m pytest -q \
            optagent/tests/python/regression \
            optagent/tests/python/integration/kernel_contract \
            optagent/tests/python/integration/solve/test_kernel_route.py \
            --tb=short
      - name: Generate semantic snapshot
        env:
          PYTHONPATH: ${{ github.workspace }}/build/gcc-fast:${{ github.workspace }}/optagent:${{ github.workspace }}/optagent/src
        run: |
          . .venv/bin/activate
          python optagent/scripts/tests/regression_snapshot.py --output artifacts/gcc/snapshot.json
      - uses: actions/upload-artifact@v4
        with:
          name: regression-snapshot-linux-amd64-${{ needs.resolve.outputs.sha }}
          path: artifacts/gcc/snapshot.json
          retention-days: 14

  windows-x64:
    name: Windows x64 regression
    needs: resolve
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Checkout exact optagent revision
        uses: actions/checkout@v4
        with:
          repository: Dongbox/optagent
          ref: ${{ needs.resolve.outputs.sha }}
          token: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          persist-credentials: false
          path: optagent
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Verify amd64 runner and build Windows wheel
        shell: pwsh
        run: |
          if ($env:PROCESSOR_ARCHITECTURE -ne "AMD64") {
            throw "Expected an amd64 Windows runner, got $env:PROCESSOR_ARCHITECTURE"
          }
          python -m pip install --upgrade pip cryptography ninja
          New-Item -ItemType Directory -Force -Path artifacts/windows | Out-Null
          ./optagent/scripts/release/build_windows_wheel.ps1 `
            -Python (Get-Command python).Source `
            -OutDir "${env:GITHUB_WORKSPACE}/artifacts/windows" `
            -BuildDir "${env:GITHUB_WORKSPACE}/build/windows-regression"
      - name: Install Windows wheel and test dependencies
        shell: pwsh
        run: |
          python -m venv "$env:RUNNER_TEMP\windows-regression-venv"
          $python = "$env:RUNNER_TEMP\windows-regression-venv\Scripts\python.exe"
          $wheel = (Get-ChildItem "artifacts/windows/optagent-*.whl").FullName
          & $python -m pip install --upgrade pip
          & $python -m pip install $wheel pytest 'protobuf>=6.33,<7.0' 'numpy>=1.26,<3.0' 'cryptography>=43,<46'
      - name: Generate Windows semantic snapshot
        shell: pwsh
        run: |
          $python = "$env:RUNNER_TEMP\windows-regression-venv\Scripts\python.exe"
          Push-Location $env:RUNNER_TEMP
          & $python "$env:GITHUB_WORKSPACE\optagent\scripts\tests\regression_snapshot.py" `
            --output "$env:GITHUB_WORKSPACE\artifacts\windows\snapshot.json"
          Pop-Location
      - uses: actions/upload-artifact@v4
        with:
          name: regression-snapshot-windows-amd64-${{ needs.resolve.outputs.sha }}
          path: artifacts/windows/snapshot.json
          retention-days: 14

  compare-platforms:
    name: Compare Linux and Windows semantics
    needs: [resolve, gcc-fast, windows-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: regression-snapshot-linux-amd64-${{ needs.resolve.outputs.sha }}
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: regression-snapshot-windows-amd64-${{ needs.resolve.outputs.sha }}
          path: artifacts/windows
      - name: Compare Linux and Windows semantic snapshots
        run: |
          python scripts/compare_snapshots.py \
            --baseline artifacts/linux/snapshot.json \
            --candidate artifacts/windows/snapshot.json \
            --report artifacts/platform-comparison.json
      - uses: actions/upload-artifact@v4
        with:
          name: regression-platform-comparison-${{ needs.resolve.outputs.sha }}
          path: artifacts/platform-comparison.json
          retention-days: 14

  report-status:
    name: Report optagent commit status
    if: always() && needs.resolve.result == 'success'
    needs: [resolve, harness-tests, gcc-fast, windows-x64, compare-platforms]
    runs-on: ubuntu-latest
    steps:
      - name: Determine aggregate result
        id: result
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = [
              name for name, value in needs.items()
              if name != "resolve" and value["result"] not in {"success", "skipped"}
          ]
          state = "failure" if failed else "success"
          description = (
              "Failed jobs: " + ", ".join(failed)
              if failed
              else "OptAgent regression tests passed"
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"state={state}\n")
              output.write(f"description={description[:140]}\n")
          PY
      - name: Write commit status
        env:
          GH_TOKEN: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          SHA: ${{ needs.resolve.outputs.sha }}
          STATE: ${{ steps.result.outputs.state }}
          DESCRIPTION: ${{ steps.result.outputs.description }}
        run: |
          gh api --method POST "repos/Dongbox/optagent/statuses/${SHA}" \
            -f state="${STATE}" \
            -f context="${STATUS_CONTEXT}" \
            -f description="${DESCRIPTION}" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
      - name: Fail workflow when regression failed
        if: steps.result.outputs.state != 'success'
        run: exit 1
