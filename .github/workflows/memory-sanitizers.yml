name: Native Memory Sanitizers

on:
  workflow_dispatch:
    inputs:
      optagent_sha:
        description: Full 40-character optagent commit SHA to test
        required: true
        type: string
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

concurrency:
  group: memory-sanitizers-${{ inputs.optagent_sha || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  STATUS_CONTEXT: optagent-ci/memory-sanitizers

jobs:
  resolve:
    name: Resolve optagent revision
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.ref.outputs.sha }}
    steps:
      - name: Resolve and validate exact SHA
        id: ref
        env:
          GH_TOKEN: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          INPUT_SHA: ${{ inputs.optagent_sha }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            SHA="${INPUT_SHA}"
          else
            SHA="$(gh api repos/Dongbox/optagent/commits/main --jq .sha)"
          fi
          if [[ ! "${SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "optagent_sha must be a full 40-character commit SHA" >&2
            exit 2
          fi
          gh api "repos/Dongbox/optagent/commits/${SHA}" --silent
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - name: Mark memory sanitizers pending
        env:
          GH_TOKEN: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          SHA: ${{ steps.ref.outputs.sha }}
        run: |
          gh api --method POST "repos/Dongbox/optagent/statuses/${SHA}" \
            -f state=pending \
            -f context="${STATUS_CONTEXT}" \
            -f description="Native memory sanitizer tests are running" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  sanitizer-tests:
    name: GCC 13 ASan + UBSan + LSan
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Checkout exact optagent revision
        uses: actions/checkout@v4
        with:
          repository: Dongbox/optagent
          ref: ${{ needs.resolve.outputs.sha }}
          token: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          persist-credentials: false
          path: optagent
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++-13 ninja-build cmake
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install 'pybind11>=2.12'
      - name: Configure and build sanitizer tests
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          set -euo pipefail
          . .venv/bin/activate
          PYBIND11_DIR="$(python -m pybind11 --cmakedir)"
          cd optagent
          cmake --preset kernel-asan-ninja \
            -DPython_EXECUTABLE="${GITHUB_WORKSPACE}/.venv/bin/python" \
            -Dpybind11_DIR="${PYBIND11_DIR}"
          cmake --build --preset kernel-asan-ninja
      - name: Run native memory tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          set -euo pipefail
          cd optagent
          ctest --test-dir build/kernel-asan-ninja --output-on-failure

  report:
    name: Report memory sanitizer status
    if: always()
    needs: [resolve, sanitizer-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Publish final status
        env:
          GH_TOKEN: ${{ secrets.OPTAGENT_REPO_TOKEN }}
          SHA: ${{ needs.resolve.outputs.sha }}
          TEST_RESULT: ${{ needs.sanitizer-tests.result }}
        run: |
          set -euo pipefail
          if [[ "${TEST_RESULT}" == "success" ]]; then
            STATE=success
            DESCRIPTION="Native memory sanitizer tests passed"
          else
            STATE=failure
            DESCRIPTION="Native memory sanitizer tests failed"
          fi
          gh api --method POST "repos/Dongbox/optagent/statuses/${SHA}" \
            -f state="${STATE}" \
            -f context="${STATUS_CONTEXT}" \
            -f description="${DESCRIPTION}" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          [[ "${STATE}" == success ]]
